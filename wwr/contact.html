<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | White Water Rafting Company</title>

    <meta name="description"
      content="Contact White Water Rafting Company for bookings, inquiries, suggestions, and support. Find our location, phone, email, and send us a message.">

    <meta name="author" content="Jimmy Opot Alando">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="White Water Rafting Company Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <!-- CONTACT INFO -->
        <section class="contact-info">
            <h1>Contact Us</h1>

            <p><strong>Address:</strong> 123 River Road, Adventure City</p>
            <p><strong>Phone:</strong> +1 (555) 123-4567</p>
            <p><strong>Email:</strong> info@whitewaterrafting.com</p>

            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d..." loading="lazy">
            </iframe>
        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/employee1.jpg" alt="River Guide John">
                <figcaption>John - Senior River Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Support Agent Mary">
                <figcaption>Mary - Customer Support</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Safety Instructor David">
                <figcaption>David - Safety Instructor</figcaption>
            </figure>
        </section>

        <!-- CONTACT FORM -->
        <section class="contact-form">
            <h2>Send Us a Message</h2>

            <form>

                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>

                <p>Purpose of Message:</p>

                <label>
                    <input type="radio" name="purpose" value="general" required>
                    General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose" value="reservation">
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose" value="suggestion">
                    Website Suggestion
                </label>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="6"></textarea>

                <label>
                    <input type="checkbox" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Send Message</button>

            </form>
        </section>

    </main>

    <footer>
        <p>©2026 White Water Rafting Company | Jimmy Opot Alando</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram">
            </a>
        </nav>
    </footer>

</body>

</html>
