<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | White Water Rafting Company</title>

    <!-- FIXED: shorter meta description (under 160 chars) -->
    <meta name="description"
      content="Contact White Water Rafting Company for bookings, questions, reservations, or support. Find our location, phone, email, and send a message.">

    <meta name="author" content="Jimmy Opot Alando">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="White Water Rafting Company Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <!-- CONTACT INFORMATION -->
        <section class="contact-info">

            <h1>Contact Us</h1>

            <p><strong>Address:</strong> 123 River Road, Adventure City</p>
            <p><strong>Phone:</strong> +1 (555) 123-4567</p>
            <p><strong>Email:</strong> info@whitewaterrafting.com</p>

            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d..." loading="lazy">
            </iframe>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">

            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/employee1.jpg" alt="Rouzette - River Guide">
                <figcaption>Rouzette - Senior River Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Vallery - Customer Support">
                <figcaption>Vallery - Customer Support Specialist</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Jimmy - Safety Instructor">
                <figcaption>Jimmy - Safety Instructor</figcaption>
            </figure>

        </section>

        <!-- CONTACT FORM -->
        <section class="contact-form">

            <h2>Send Us a Message</h2>

            <form>

                <div class="form-group">
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <fieldset>
                    <legend>Purpose of Message</legend>

                    <div class="form-group">
                        <input type="radio" id="general" name="purpose" value="general" required>
                        <label for="general">General Inquiry</label>
                    </div>

                    <div class="form-group">
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        <label for="reservation">Reservation Question</label>
                    </div>

                    <div class="form-group">
                        <input type="radio" id="suggestion" name="purpose" value="suggestion">
                        <label for="suggestion">Website Suggestion</label>
                    </div>

                </fieldset>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="6"></textarea>
                </div>

                <div class="form-group">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Please subscribe me to the monthly newsletter</label>
                </div>

                <button type="submit">Send Inquiry</button>

            </form>

        </section>

    </main>

    <footer>

        <p>©2026 White Water Rafting Company | Jimmy Opot Alando</p>

        <nav class="socialmedia">

            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook icon">
            </a>

            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn icon">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram icon">
            </a>

        </nav>

    </footer>

</body>

</html>
